<template>
    <lightning-card title={title}>
        <template if:true={isOpportunity}>
            <lightning-record-edit-form object-api-name="Opportunity">
                <lightning-input-field field-name="AccountId" onchange={handleTargetChange}>
                </lightning-input-field>
            </lightning-record-edit-form>
        </template>

        <template if:false={isOpportunity}>
            <lightning-record-edit-form object-api-name="Case">
                <lightning-input-field field-name="ContactId" onchange={handleTargetChange}>
                </lightning-input-field>
            </lightning-record-edit-form>
        </template>
        <lightning-datatable key-field="id" columns={columns} data={tableData} hide-checkbox-column
            default-sort-direction={defaultSortDirection} sorted-direction={sortDirection} sorted-by={sortedBy}
            onsort={onHandleSort}>
        </lightning-datatable>
    </lightning-card>




    <template if:true={showViewAll}>
        <div class="slds-m-top_small">
            <lightning-button variant="brand" label="View All" onclick={handleViewAll}>
            </lightning-button>
        </div>
    </template>

</template>
