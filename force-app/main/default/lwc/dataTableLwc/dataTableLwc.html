<template>
    <lightning-card title={title}>
        <template if:true={hasTarget}>
            <lightning-record-edit-form object-api-name={objectApiName}>
                <lightning-input-field field-name={targetField} onchange={handleTargetChange}>
                </lightning-input-field>
            </lightning-record-edit-form>
        </template>

        <template if:true={error}>
            <p class="slds-text-color_error slds-m-around_small">{error}</p>
        </template>
        <lightning-datatable key-field="Id" columns={columns} data={tableData} hide-checkbox-column
            default-sort-direction={defaultSortDirection} sorted-direction={sortDirection} sorted-by={sortedBy}
            onsort={onHandleSort}>
        </lightning-datatable>
    </lightning-card>
    <template if:true={showViewAll}>
        <div class="slds-m-top_small">
            <lightning-button variant="brand" label="View All" onclick={handleViewAll}>
            </lightning-button>
        </div>
    </template>

</template>
